{% extends "layout.html" %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 0.5rem;">Join CareerCopilot</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Start your AI-powered career preparation today</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="/login" style="color: var(--primary);">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
