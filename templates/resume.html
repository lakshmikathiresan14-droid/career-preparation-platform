{% extends "layout.html" %}

{% block content %}
<div style="max-width: 800px; margin: 2rem auto;">
    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2>AI Resume Builder</h2>
                <p style="color: var(--text-muted);">Fill in your details to generate a professional resume.</p>
            </div>
            <a href="/view_resumes" class="btn btn-outline"><i class="fas fa-folder-open"></i> View Saved</a>
        </div>
        
        <form method="POST">
            <div class="grid" style="grid-template-columns: 1fr 1fr;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="+1 234 567 890" required>
            </div>
            <div class="form-group">
                <label>Education</label>
                <textarea name="education" placeholder="E.g. Computer Science at Stanford University"></textarea>
            </div>
            <div class="form-group">
                <label>Skills</label>
                <textarea name="skills" placeholder="E.g. Python, Flask, React, SQL"></textarea>
            </div>
            <div class="form-group">
                <label>Projects</label>
                <textarea name="projects" placeholder="Describe your key projects..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Generate Resume</button>
        </form>
    </div>
</div>
{% endblock %}
